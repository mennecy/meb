<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia&effect=fire|shadow-multiple">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fancybox/3.4.0/jquery.fancybox.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fancybox/3.4.0/jquery.fancybox.min.js"></script>

    <style>
        /* visited state */
        
        a:visited {
            background-color: yellow;
            border-color: hotpink;
        }
        /* hover state */
        
        a:hover {
            background-color: cyan;
        }
        /* focus state */
        
        a:focus {
            background-color: green;
        }
        
        a:active {
            color: yellow;
        }
    </style>
</head>

<body>
    <!-- menu header -->
    {{ partial "header.html" . }}

    <!-- main title -->
    <div class="container-flex centered  text-center text-black bg-info pt-5 mt-5">
        <h1>
            {{ with .Site.Params.Description }}
            <span class="subheading">{{ . }}</span> {{ end }}
        </h1>

        <!-- add button on each page -->
        <div class="row bg-info pt-0 mt-0">
            <div class="col container">
                {{ range .Pages }}
                <a class="btn btn-outline-dark border border-0" href="{{ .RelPermalink }}" role="button">{{ .Title }}</a> {{ end }}
            </div>
        </div>
    </div>

    <!-- Add the md content -->
    <div class="container-fluid bg-light">{{ .Content }}</div>

    <!-- add footer-->
    <h1 class="text-center bg-success">{{ partial "footer.html" . }}</h1>
</body>

</html>
